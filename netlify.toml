[build]
  command   = "npm run build"
  publish   = "build"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"
  timeout = 30

[build.environment]
  NODE_VERSION = "18"

[[redirects]]
  from   = "/api/generate"
  to     = "/.netlify/functions/generate"
  status = 200

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
